<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulis Aspirasi - SuaraKita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Glows -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2" style="top: 200px; bottom: auto; background-color: rgba(225, 29, 72, 0.2);"></div>

    <div class="container">
        <!-- Header -->
        <header>
            <nav class="glass-panel">
                <a href="index.html" class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#3b82f6" />
                                <stop offset="100%" stop-color="#fbbf24" />
                            </linearGradient>
                        </defs>
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                    SuaraKita
                </a>
                <div class="nav-links">
                    <a href="index.html">Beranda</a>
                    <a href="tentang.html">Tentang Kami</a>
                    <a href="daftar.html">Daftar Aspirasi</a>
                    <a href="form.html" style="color: var(--secondary-color);">Tulis Aspirasi</a>
                </div>
            </nav>
        </header>

        <!-- Main Content -->
        <main>
            <div class="glass-panel form-container">
                <h2 style="text-align: center; margin-bottom: 30px;">Tulis Aspirasi Baru</h2>
                
                <div id="alertSuccess" class="alert alert-success">
                    <strong>Berhasil!</strong> Aspirasi Anda telah tersimpan. Mengalihkan ke Daftar Aspirasi...
                </div>

                <form id="aspirasiForm">
                    <div class="form-group">
                        <label for="judul">Judul Aspirasi</label>
                        <input type="text" id="judul" class="form-control" placeholder="Contoh: Perbaikan AC Kelas Gedung A" required>
                    </div>

                    <div class="form-group">
                        <label for="kategori">Kategori</label>
                        <select id="kategori" class="form-control" required>
                            <option value="" disabled selected>Pilih Kategori...</option>
                            <option value="Akademik">Akademik</option>
                            <option value="Fasilitas">Fasilitas</option>
                            <option value="Layanan">Layanan Mahasiswa</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="deskripsi">Deskripsi Detail</label>
                        <textarea id="deskripsi" class="form-control" placeholder="Jelaskan aspirasi atau keluhan Anda secara detail..." required></textarea>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="anonim" checked>
                        <label for="anonim">Kirim sebagai Anonim</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Kirim Aspirasi</button>
                </form>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 SuaraKita - Platform Aspirasi Mahasiswa. All rights reserved.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
